name: PrimalitySheafVerification CI

on:
  push:
    branches: [master]
    paths:
      - 'PrimalitySheafVerification/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/primality-sheaf-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'PrimalitySheafVerification/**'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - '.github/workflows/primality-sheaf-ci.yml'
  workflow_dispatch:

concurrency:
  group: primality-sheaf-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check PrimalitySheafVerification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Lean and fetch Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          use-github-cache: false
          use-mathlib-cache: true

      - name: Check stable Lean files
        shell: bash
        run: |
          set -euo pipefail

          strict_files=(
            "PrimalitySheafVerification/Spt1.lean"
            "PrimalitySheafVerification/Spt2.lean"
            "PrimalitySheafVerification/Spt3.lean"
            "PrimalitySheafVerification/Spt4.lean"
            "PrimalitySheafVerification/Spt5.lean"
          )

          for file in "${strict_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required stable file is missing"
              exit 1
            fi

            echo "::group::lake env lean $file"
            lake env lean "$file"
            echo "::endgroup::"
          done

      - name: Advisory check for in-progress files
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail

          advisory_files=(
            "PrimalitySheafVerification/Spt6.lean"
            "PrimalitySheafVerification/Spt7.lean"
            "PrimalitySheafVerification/Verification.lean"
            "PrimalitySheafVerification/Spt2_AdditionalFormalization.lean"
            "PrimalitySheafVerification/Spt2_BypassCertificate.lean"
            "PrimalitySheafVerification/Spt2_CompletionLayer.lean"
            "PrimalitySheafVerification/Spt2_GeometricWorkarounds.lean"
            "PrimalitySheafVerification/Spt2_Master_Integrated.lean"
          )

          failures=0

          for file in "${advisory_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "::group::lake env lean $file"
              if lake env lean "$file"; then
                echo "OK: $file"
              else
                echo "::warning file=$file::Advisory Lean check failed; this file is treated as in-progress"
                failures=$((failures + 1))
              fi
              echo "::endgroup::"
            else
              echo "::notice file=$file::Advisory file is not present; skipping"
            fi
          done

          if [[ "$failures" -gt 0 ]]; then
            echo "::warning::$failures advisory file(s) failed. Stable CI still passed."
          fi
